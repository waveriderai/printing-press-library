name: Build CLI release artifacts

# Builds cross-platform release artifacts for printed CLIs and publishes them
# under a moving `<slug>-current` tag. Each release contains:
#   - .mcpb bundles for Claude Desktop (3 platforms: darwin/arm64, windows/amd64, windows/arm64)
#   - raw CLI binaries for terminal users (6 platforms: standard Go matrix)
#
# The README in each CLI links to releases/download/<slug>-current/<asset>,
# so each push to main rebuilds and the URLs stay stable forever.
#
# Triggers:
#   - workflow_dispatch (manual): rebuild a specific CLI or "all"
#   - push to main on library/** (excluding build/): rebuild affected CLIs
#
# Auth: requires GENERATOR_READ_TOKEN (fine-grained PAT with Contents:read on
# mvanhorn/cli-printing-press) so the bundle job can `go install` the
# cli-printing-press generator from a private repo. The build-cli job doesn't
# need it — printed CLIs only depend on public Go modules.

on:
  workflow_dispatch:
    inputs:
      cli:
        description: 'CLI to rebuild as <category>/<slug>, or "all" for every CLI in the library'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      # Inputs that actually affect the compiled CLI binary or MCPB
      # bundle: Go source, module files, and the MCPB manifest. The
      # //go:embed directive can include any file type, but in practice
      # those files live inside cmd/ or internal/ (e.g. dub's
      # internal/mcp/embedded_manifest.json), so this whitelist still
      # catches them.
      #
      # Anything else under library/<cat>/<slug>/ — README.md, SKILL.md,
      # LICENSE, NOTICE, Makefile, .golangci.yml, .goreleaser.yaml,
      # .printing-press.json, spec.{yaml,json}, dogfood-results.json,
      # workflow-verify-report.json, .manuscripts/** — is documentation,
      # provenance, archived input, or post-build artifact and does not
      # belong in the rebuild trigger.
      - 'library/**/cmd/**'
      - 'library/**/internal/**'
      - 'library/**/go.mod'
      - 'library/**/go.sum'
      - 'library/**/manifest.json'
      - '.github/workflows/build-mcpb.yml'

permissions:
  contents: write  # for creating/updating releases

jobs:
  detect:
    name: Detect affected CLIs
    runs-on: ubuntu-latest
    outputs:
      affected: ${{ steps.detect.outputs.affected }}
      count: ${{ steps.detect.outputs.count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # need history to diff against parent commit
      - id: detect
        name: Determine affected CLIs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_CLI: ${{ inputs.cli }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -z "$INPUT_CLI" ] || [ "$INPUT_CLI" = "all" ]; then
              affected=$(find library -mindepth 2 -maxdepth 2 -type d \
                | sed 's|library/||' \
                | sort -u \
                | jq -R . | jq -s -c .)
            else
              affected=$(printf '%s' "$INPUT_CLI" | jq -R . | jq -s -c .)
            fi
          else
            # Push event: diff against parent commit. The all-zeros sentinel
            # appears for initial branch pushes; fall back to HEAD^ then to
            # listing all library entries so the workflow degrades gracefully.
            #
            # Pathspec is restricted to build-relevant files (Go source under
            # cmd/ and internal/, module files, MCPB manifest). This mirrors
            # the on.push.paths filter above so a mixed commit that touches
            # build-relevant files in CLI A and only docs in CLI B rebuilds
            # A only. Without this filter, the awk extraction would include
            # B as affected because any path under library/<cat>/<slug>/
            # surfaces the same <cat>/<slug>.
            build_paths=(
              'library/**/cmd/**'
              'library/**/internal/**'
              'library/**/go.mod'
              'library/**/go.sum'
              'library/**/manifest.json'
            )
            if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE_SHA" ]; then
              changed_paths=$(git diff --name-only "HEAD^" "HEAD" -- "${build_paths[@]}" 2>/dev/null || git ls-files "${build_paths[@]}")
            else
              changed_paths=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- "${build_paths[@]}" || true)
            fi
            # Filter to directories that still exist in the merged tree so a
            # rename (which surfaces in `git diff` as deletions under the old
            # slug + additions under the new slug) doesn't spawn a spurious
            # matrix branch for the now-deleted directory. Without this, the
            # bundle/build/release jobs run vacuously or fail noisily for the
            # old slug. See issue #250 for the flightgoat -> flight-goat case.
            affected=$(printf '%s\n' "$changed_paths" \
              | awk -F/ 'NF >= 3 && $1 == "library" { print $2"/"$3 }' \
              | sort -u \
              | while IFS= read -r entry; do
                  [ -d "library/$entry" ] && printf '%s\n' "$entry"
                done \
              | jq -R . | jq -s -c .)
          fi
          # Filter out empty/null entries
          affected=$(printf '%s' "$affected" | jq -c '[ .[] | select(. != null and . != "") ]')
          count=$(printf '%s' "$affected" | jq 'length')
          echo "affected=$affected" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Affected CLIs ($count): $affected"

  bundle:
    name: Bundle ${{ matrix.target }} (${{ matrix.platform }})
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.affected) }}
        platform:
          # Scoped to platforms Claude Desktop actually runs on. Intel Macs
          # dropped because Apple Silicon dominates the install base; Linux
          # dropped because Claude Desktop doesn't ship there at all (Linux
          # Claude Code users have the focused skill path instead of MCPB).
          - darwin/arm64
          - windows/amd64
          - windows/arm64
    concurrency:
      # Cancel in-flight bundles when a newer push for the same (cli, platform)
      # lands. The newer source supersedes the older, so completing the older
      # build would just produce assets we'd overwrite seconds later.
      group: bundle-${{ matrix.target }}-${{ matrix.platform }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          # Public library is a monorepo with per-CLI go.mod under library/<cat>/<slug>/.
          # Point setup-go at this matrix entry's go.sum so its module cache is keyed
          # correctly. Without this, setup-go warns "Dependencies file is not found".
          cache-dependency-path: library/${{ matrix.target }}/go.sum
      - name: Configure git for private modules
        env:
          TOKEN: ${{ secrets.GENERATOR_READ_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::GENERATOR_READ_TOKEN secret is not set. The workflow needs a fine-grained PAT with Contents:read on mvanhorn/cli-printing-press."
            exit 1
          fi
          git config --global url."https://oauth2:${TOKEN}@github.com/".insteadOf "https://github.com/"
      - name: Install cli-printing-press
        env:
          GOPRIVATE: github.com/mvanhorn/*
        run: |
          go install github.com/mvanhorn/cli-printing-press/v4/cmd/cli-printing-press@latest
          cli-printing-press --version
      - name: Bundle MCPB
        env:
          CLI_TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          cli_dir="library/${CLI_TARGET}"
          os="${PLATFORM%/*}"
          arch="${PLATFORM#*/}"
          slug=$(basename "${CLI_TARGET}")
          # Set artifact-name env vars unconditionally so the upload step
          # always has valid values, even when we early-exit below.
          # actions/upload-artifact@v4 rejects / in names; slugs are unique
          # across the library (slug-keyed dirs), so slug + os-arch is a
          # safe and stable artifact name.
          echo "SLUG=${slug}" >> "$GITHUB_ENV"
          echo "PLATFORM_TAG=${os}-${arch}" >> "$GITHUB_ENV"
          if [ ! -f "${cli_dir}/manifest.json" ]; then
            echo "::warning::${cli_dir} has no manifest.json — skipping bundle (likely pre-v3.0.0; needs regen via printing-press-publish)."
            exit 0
          fi
          out="${RUNNER_TEMP}/out/${slug}-pp-mcp-${os}-${arch}.mcpb"
          mkdir -p "$(dirname "$out")"
          cli-printing-press bundle "$cli_dir" --platform "${PLATFORM}" --output "$out"
          ls -lh "$out"
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: mcpb-${{ env.SLUG }}-${{ env.PLATFORM_TAG }}
          path: ${{ runner.temp }}/out/*.mcpb
          if-no-files-found: ignore
          retention-days: 7

  build-cli:
    name: Build CLI ${{ matrix.target }} (${{ matrix.platform }})
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.affected) }}
        # Standard Go cross-compile matrix. Linux included because terminal
        # users on servers/CI want it; the MCPB matrix above is narrower
        # because Claude Desktop doesn't ship on Linux.
        platform:
          - darwin/amd64
          - darwin/arm64
          - linux/amd64
          - linux/arm64
          - windows/amd64
          - windows/arm64
    concurrency:
      group: build-cli-${{ matrix.target }}-${{ matrix.platform }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: library/${{ matrix.target }}/go.sum
      - name: Build CLI binary
        env:
          CLI_TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -euo pipefail
          cli_dir="library/${CLI_TARGET}"
          os="${PLATFORM%/*}"
          arch="${PLATFORM#*/}"
          slug=$(basename "${CLI_TARGET}")
          # cli_name is the authoritative binary name. Reading it from
          # .printing-press.json keeps this step honest when a CLI's directory
          # basename and cli_name diverge (e.g. an abbreviated slug paired
          # with a longer spec-derived binary name). Falling back to the
          # derived form preserves behavior for entries whose manifest
          # predates this field. See PR #455 / issue #688 for the jira case
          # this prevents.
          cli_name=$(jq -er '.cli_name' "${cli_dir}/.printing-press.json" 2>/dev/null || printf '%s-pp-cli' "${slug}")
          echo "SLUG=${slug}" >> "$GITHUB_ENV"
          echo "PLATFORM_TAG=${os}-${arch}" >> "$GITHUB_ENV"
          ext=""
          if [ "$os" = "windows" ]; then
            ext=".exe"
          fi
          out="${RUNNER_TEMP}/out/${slug}-pp-cli-${os}-${arch}${ext}"
          mkdir -p "$(dirname "$out")"
          cd "$cli_dir"
          # CGO_ENABLED=0 — printed CLIs use the pure-Go modernc/sqlite driver
          # so cross-compile works without C toolchains. Matches the goreleaser
          # config the CLI ships with.
          GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 \
            go build -trimpath -ldflags='-s -w' \
            -o "$out" "./cmd/${cli_name}"
          ls -lh "$out"
      - name: Upload CLI artifact
        uses: actions/upload-artifact@v6
        with:
          name: cli-${{ env.SLUG }}-${{ env.PLATFORM_TAG }}
          path: ${{ runner.temp }}/out/*
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Release ${{ matrix.target }}
    needs: [detect, bundle, build-cli]
    # !cancelled() so a single CLI's bundle/build failure doesn't cascade-skip
    # release for every other successful CLI in the same matrix run. Each
    # release matrix entry is per-app (keyed on matrix.target) and downloads
    # only its own slug's artifacts, so apps don't share fate. Per-app
    # success is then enforced by the strict gate inside the release script.
    if: ${{ !cancelled() && needs.detect.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJson(needs.detect.outputs.affected) }}
    concurrency:
      # Cancel in-flight releases for the same CLI when a newer push lands.
      # gh release upload --clobber is per-asset, so a canceled mid-upload
      # is recovered by the superseding run's upload pass.
      group: release-${{ matrix.target }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - name: Compute slug
        id: slug
        env:
          CLI_TARGET: ${{ matrix.target }}
        run: |
          slug=$(basename "${CLI_TARGET}")
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"
      - name: Download MCPB artifacts for this CLI
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/dl
          pattern: mcpb-${{ steps.slug.outputs.slug }}-*
          merge-multiple: true
      - name: Download CLI binary artifacts for this CLI
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/dl
          pattern: cli-${{ steps.slug.outputs.slug }}-*
          merge-multiple: true
      - name: List downloaded artifacts and enforce per-app gate
        env:
          CLI_TARGET: ${{ matrix.target }}
          SLUG: ${{ steps.slug.outputs.slug }}
        run: |
          ls -lh "${RUNNER_TEMP}/dl" || true
          mcpb_count=$(find "${RUNNER_TEMP}/dl" -name '*.mcpb' 2>/dev/null | wc -l | tr -d ' ')
          # CLI binaries have no consistent extension — count what's left after excluding .mcpb.
          all_count=$(find "${RUNNER_TEMP}/dl" -type f 2>/dev/null | wc -l | tr -d ' ')
          cli_count=$((all_count - mcpb_count))
          echo "Found ${mcpb_count} .mcpb file(s) and ${cli_count} CLI binary file(s)."
          # Strict per-app gate: an app's release only publishes when both
          # its CLI binaries AND (if it ships an MCPB) its bundles produced
          # at least one artifact. A partial release (CLI without MCPB or
          # vice versa) confuses users by hiding the upstream build failure
          # behind a moving "-current" tag that looks healthy. The
          # manifest.json existence check on the MCPB side is forward-
          # compatibility for future CLI-only entries that legitimately
          # ship without a bundle.
          if [ "$cli_count" = "0" ]; then
            echo "::warning::Skipping release for ${SLUG}: no CLI binaries produced (build-cli matrix failed for this app)."
            exit 0
          fi
          if [ -f "library/${CLI_TARGET}/manifest.json" ] && [ "$mcpb_count" = "0" ]; then
            echo "::warning::Skipping release for ${SLUG}: app declares manifest.json (expects MCPB) but no .mcpb produced (bundle matrix failed for this app)."
            exit 0
          fi
      - name: Verify release-write PAT
        env:
          GH_TOKEN: ${{ secrets.RELEASE_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::RELEASE_WRITE_TOKEN secret is not set. Without it, the release step cannot create or update releases. See the PR that introduced this for setup instructions."
            exit 1
          fi
          # Probe the user identity. If the token is unrecognized, this 401s
          # before the release step gets a chance to fail with a confusing
          # "error checking for existing release". On success, prints the
          # authenticated login so the runtime audit trail shows which
          # account's PAT actually executed the release.
          if ! resp=$(gh api /user --jq '.login' 2>&1); then
            echo "::error::RELEASE_WRITE_TOKEN failed authentication. Verify the PAT exists, hasn't expired, and includes Contents:write on this repo. Raw error: ${resp}"
            exit 1
          fi
          echo "Release token authenticated as: ${resp}"
          # Verify the token has access to this specific repo. If the PAT
          # was scoped to a different repo (e.g., the generator), this 404s.
          if ! gh api "/repos/${GITHUB_REPOSITORY}" --jq '.full_name' >/dev/null 2>&1; then
            echo "::error::RELEASE_WRITE_TOKEN does not have access to ${GITHUB_REPOSITORY}. Re-scope the PAT to include this repo."
            exit 1
          fi
          echo "PAT confirmed for repo ${GITHUB_REPOSITORY}."
      - name: Publish release ${{ steps.slug.outputs.slug }}-current
        env:
          # Use a fine-grained PAT (Contents:write on this repo) instead of
          # the default GITHUB_TOKEN. The workflow's GITHUB_TOKEN reports
          # contents:write in its permissions log but the API still 403s on
          # release creation — likely a silent installation-token cap from
          # the GitHub Actions integration itself, invisible from the API.
          # The PAT bypasses that cap by acting as the user who minted it.
          GH_TOKEN: ${{ secrets.RELEASE_WRITE_TOKEN }}
          SLUG: ${{ steps.slug.outputs.slug }}
          CLI_TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          tag="${SLUG}-current"
          # Skip if neither bundle nor CLI artifacts were produced.
          if ! find "${RUNNER_TEMP}/dl" -type f -print -quit | grep -q .; then
            echo "No artifacts to publish for ${SLUG}; skipping release."
            exit 0
          fi
          # shellcheck disable=SC2016
          notes=$(printf 'Auto-built artifacts for **%s** at commit %s.\n\n**Claude Desktop:** download the matching `.mcpb` file and double-click to install.\n\n**Terminal CLI:** download the binary matching your platform. On macOS you may need to clear the Gatekeeper quarantine: `xattr -d com.apple.quarantine <binary>`. On Unix, `chmod +x <binary>`.\n\n_This is a moving tag — it always points at the latest build._' "${CLI_TARGET}" "${GITHUB_SHA}")
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Updating existing release ${tag}"
            gh release upload "${tag}" "${RUNNER_TEMP}"/dl/* --clobber
            gh release edit "${tag}" --notes "${notes}" --target "${GITHUB_SHA}"
          else
            echo "Creating new release ${tag}"
            gh release create "${tag}" "${RUNNER_TEMP}"/dl/* \
              --title "${SLUG} (latest build)" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}" \
              --latest=false
          fi
