name: Regenerate registry.json and README catalog

# Regenerates registry.json from each CLI's .printing-press.json +
# manifest.json whenever a library/** change lands on main. Also
# regenerates the README catalog table and count callout (sentinel
# regions) from the same entries slice, and commits both with
# [skip ci].
#
# This is the same generated-artifact pattern this repo already uses
# for cli-skills/ — PRs don't touch the generated outputs directly, the
# post-merge regen does, eliminating the merge-conflict-hell that
# plagued hand-maintained registry.json and README updates when
# multiple PRs landed in the same window.
#
# README.md and registry.json are also in the trigger path: the README
# catalog cells depend on curated `description` values stored in
# registry.json, so editing a description in registry.json should
# reflect into README on the next regen. Including README.md catches
# the case where someone hand-edits the catalog sentinel region; the
# regen overwrites it back to truth.
#
# Source of truth: tools/generate-registry/main.go. See its package doc
# for the field derivation rules.

on:
  push:
    branches: [main]
    paths:
      - 'library/**/.printing-press.json'
      - 'library/**/manifest.json'
      - 'library/**/.goreleaser.yaml'
      - 'registry.json'
      - 'README.md'
      - 'tools/generate-registry/**'
      - '.github/workflows/generate-registry.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    name: Regenerate and commit
    runs-on: ubuntu-latest
    # Queue registry regenerations, but do not share this group with sibling
    # generated-artifact workflows. GitHub keeps only one pending run per
    # concurrency group, so a shared group lets a skills or release-ledger run
    # evict the pending registry run and leave registry.json stale. Push races
    # with sibling workflows are handled by the rebase-before-push step below.
    concurrency:
      group: generate-registry-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          # We need write access on the same branch we just pushed to.
          # GITHUB_TOKEN's default ref is the merge commit; explicitly
          # check out main so the push at the end targets it.
          ref: main
          # Admin-scoped PAT so the post-commit push bypasses the
          # main-branch ruleset (default GITHUB_TOKEN cannot bypass).
          token: ${{ secrets.ADMIN_PUSH_PAT }}
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - name: Run generator
        run: go run ./tools/generate-registry/main.go
      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- registry.json README.md; then
            echo "No generated-artifact changes; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add registry.json README.md
          # [skip ci] suppresses the chained workflow run on the
          # generated commit. Without it, the regen commit would
          # re-trigger this workflow, producing a noop commit chain.
          # Note: README.md is in the trigger path so a hand-edit to
          # the sentinel region would normally re-trigger; this commit
          # itself is suppressed by [skip ci] so we don't loop.
          git commit -m "chore(registry): regenerate from library/ [skip ci]"
          # Defense-in-depth against sibling generated-artifact workflows
          # landing between our checkout and push. They touch disjoint paths
          # (registry.json + README.md vs cli-skills/ or library release
          # metadata), so the rebase is conflict-free in practice.
          git pull --rebase origin main
          git push
