version: 2
project_name: follow-up-boss-pp-cli
changelog:
  disable: true
builds:
  - id: follow-up-boss-pp-cli
    main: ./cmd/follow-up-boss-pp-cli
    binary: follow-up-boss-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X follow-up-boss-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: follow-up-boss-pp-mcp
    main: ./cmd/follow-up-boss-pp-mcp
    binary: follow-up-boss-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: follow-up-boss-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/user/follow-up-boss-pp-cli"
    description: "Docs-derived Follow Up Boss REST API spec for CLI Printing Press."
    install: |
      bin.install "follow-up-boss-pp-cli"
      bin.install "follow-up-boss-pp-mcp"
