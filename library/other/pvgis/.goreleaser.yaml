version: 2
project_name: pvgis-pp-cli
changelog:
  disable: true
builds:
  - id: pvgis-pp-cli
    main: ./cmd/pvgis-pp-cli
    binary: pvgis-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/pvgis/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: pvgis-pp-mcp
    main: ./cmd/pvgis-pp-mcp
    binary: pvgis-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pvgis-pp-cli
    repository:
      owner: roberto-bissanti
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The free, single-binary PVGIS CLI — JRC solar-radiation and PV-yield estimates with offline cache, multi-site..."
    install: |
      bin.install "pvgis-pp-cli"
      bin.install "pvgis-pp-mcp"
