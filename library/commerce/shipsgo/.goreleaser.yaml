version: 2
project_name: shipsgo-pp-cli
changelog:
  disable: true
builds:
  - id: shipsgo-pp-cli
    main: ./cmd/shipsgo-pp-cli
    binary: shipsgo-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/shipsgo/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: shipsgo-pp-mcp
    main: ./cmd/shipsgo-pp-mcp
    binary: shipsgo-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: shipsgo-pp-cli
    repository:
      owner: werkstoffclub
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every ShipsGo endpoint, plus an RFQ workspace, lane analytics, and an offline shipment book no other tool offers."
    install: |
      bin.install "shipsgo-pp-cli"
      bin.install "shipsgo-pp-mcp"
