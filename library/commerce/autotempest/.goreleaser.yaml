version: 2
project_name: autotempest-pp-cli
changelog:
  disable: true
builds:
  - id: autotempest-pp-cli
    main: ./cmd/autotempest-pp-cli
    binary: autotempest-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/autotempest/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: autotempest-pp-mcp
    main: ./cmd/autotempest-pp-mcp
    binary: autotempest-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: autotempest-pp-cli
    repository:
      owner: richardadonnell
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every AutoTempest car-search source in your terminal, with a local store, cross-source VIN dedupe"
    install: |
      bin.install "autotempest-pp-cli"
      bin.install "autotempest-pp-mcp"
